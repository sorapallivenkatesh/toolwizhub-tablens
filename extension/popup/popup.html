<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TabLens</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="top">
    <img class="top__logo" src="../icons/48.png" width="28" height="28" alt="" />
    <h1>TabLens</h1>
    <button id="opts" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <section class="stats">
    <div class="stat">
      <span class="stat__ic">🔥</span>
      <div class="stat__num" id="streak">–</div>
      <div class="stat__lbl">day streak</div>
    </div>
    <div class="stat">
      <span class="stat__ic">⏱️</span>
      <div class="stat__num" id="today">–</div>
      <div class="stat__lbl">today</div>
    </div>
  </section>

  <section class="block">
    <h2>Top sites today</h2>
    <ul id="sites" class="sites"><li class="empty">No browsing tracked yet.</li></ul>
  </section>

  <section class="block" id="changes-block" hidden>
    <h2>Pages that changed</h2>
    <ul id="changes" class="changes"></ul>
  </section>

  <footer class="foot">
    <div class="foot__status"><span class="foot__dot"></span> Runs 100% locally — nothing leaves your browser</div>
    <a class="foot__brand" href="https://toolwizhub.com" target="_blank" rel="noopener" title="ToolWizHub">
      <img src="../assets/toolwizhub-logo.webp" alt="ToolWizHub" width="150" />
    </a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
